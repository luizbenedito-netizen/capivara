<style>
    .bottom-menu {
        background-color: var(--bg-main);
        border-top: 2px solid var(--border-color);
    }

    .menu-item {
        flex: 1;
        /* distribui igualmente */
        display: flex;
        justify-content: center;
        align-items: center;
        text-decoration: none;
    }

    .menu-btn {
        background: none;
        color: inherit;
        border: none;
        padding: 0;
        font: inherit;
        cursor: pointer;
        outline: inherit;
        padding: 25px;
        align-items: center;
    }

    .menu-item:hover {
        background-color: var(--menu-hover);
        cursor: pointer;
    }

    .menu-btn i {
        color: var(--icon-color);
        font-size: 20px;
    }

    .icon-active {
        background-color: var(--accent);
    }

    .active i {
        color: var(--accent) !important;
    }

    .fs-25 {
        font-size: 25px !important;
    }
</style>
<nav class="bottom-menu fixed-bottom">
    <div class="container-fluid d-flex p-0">

        <div class="menu-item {% if active_page == 'home' %}active{% endif %}"
            onclick="if(this.classList.contains('active') === false) window.location.href = '/home'">
            <button class="menu-btn">
                <i class="fa-home"></i>
            </button>
        </div>

        <div class="menu-item {% if active_page == 'dashboard' %}active{% endif %}"
            onclick="if(this.classList.contains('active') === false) window.location.href = '/dashboard'">
            <button class="menu-btn">
                <i class="fa-chart-pie fs-25"></i>
            </button>
        </div>

        <div class="menu-item {% if active_page == 'reports' %}active{% endif %}"
            onclick="if(this.classList.contains('active') === false) window.location.href = '/reports'">
            <button class="menu-btn">
                <i class="fa-report"></i>
            </button>
        </div>

        <div class="menu-item {% if active_page == 'calc' %}active{% endif %}"
            onclick="if(this.classList.contains('active') === false) window.location.href = '/calc'">
            <button class="menu-btn">
                <i class="fa-calculator-simple fs-25"></i>
            </button>
        </div>

        <div class="menu-item {% if active_page == 'user' %}active{% endif %}"
            onclick="if(this.classList.contains('active') === false) window.location.href = '/user'">
            <button class="menu-btn">
                <i class="fa-user"></i>
            </button>
        </div>

    </div>
</nav>
